name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.JS
        uses: actions/setup-node@v6
        with:
          check-latest: true
          cache: 'yarn'
          node-version-file: '.tool-versions'

      - name: Install Javascript dependencies
        run: yarn install --immutable

      - name: Cache SvelteKit Build Assets
        uses: actions/cache@v6
        with:
          path: |
            .svelte-kit
            node_modules/.vite
          key: ${{ runner.os }}-sveltekit-${{ hashFiles('**/yarn.lock', '**/vite.config.js') }}
          restore-keys: |
            ${{ runner.os }}-sveltekit-

      - name: Lint
        run: yarn run lint

      - name: Build website
        run: yarn run build

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'build/'

  deploy:
    needs: build
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v5
